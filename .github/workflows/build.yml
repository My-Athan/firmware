name: Firmware CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32c3

      - name: Report binary size
        run: |
          SIZE=$(stat -c%s .pio/build/esp32c3/firmware.bin 2>/dev/null || echo "0")
          echo "### Firmware Size" >> $GITHUB_STEP_SUMMARY
          echo "Binary: $(numfmt --to=iec $SIZE)" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: .pio/build/esp32c3/firmware.bin
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run unit tests
        run: pio test -e esp32c3 --without-uploading

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "See job output for details" >> $GITHUB_STEP_SUMMARY

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build release firmware
        run: pio run -e esp32c3

      - name: Compute checksums
        id: checksum
        run: |
          SHA256=$(sha256sum .pio/build/esp32c3/firmware.bin | cut -d' ' -f1)
          SIZE=$(stat -c%s .pio/build/esp32c3/firmware.bin)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .pio/build/esp32c3/firmware.bin
          generate_release_notes: true
          body: |
            ## Firmware v${{ steps.checksum.outputs.version }}

            **SHA256**: `${{ steps.checksum.outputs.sha256 }}`
            **Size**: ${{ steps.checksum.outputs.size }} bytes

      - name: Publish to backend
        if: vars.BACKEND_URL != ''
        continue-on-error: true
        run: |
          curl -X POST "${{ vars.BACKEND_URL }}/api/admin/releases" \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            -F "file=@.pio/build/esp32c3/firmware.bin" \
            -F "version=${{ steps.checksum.outputs.version }}" \
            -F "sha256=${{ steps.checksum.outputs.sha256 }}" \
            -F "size=${{ steps.checksum.outputs.size }}"
