; MyAthan Firmware — ESP32-C3 SuperMini + DFPlayer Mini
; https://github.com/My-Athan/firmware

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Partition scheme: Default OTA with LittleFS
; Note: must use default.csv (2x1MB app) + littlefs (600KB) layout
; NOT min_spiffs.csv which incompatible with littlefs mount
board_build.partitions = default.csv
board_build.filesystem = littlefs

; Library dependencies
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    dfrobot/DFRobotDFPlayerMini@^1.0.6
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    tzapu/WiFiManager@^2.0.17

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -D HARDWARE_TYPE=\"esp32c3-v1\"
